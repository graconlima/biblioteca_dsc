server {
    listen 80;
    server_name biblioteca.serveblog.net;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name biblioteca.serveblog.net;

    ssl_certificate /etc/letsencrypt/live/biblioteca.serveblog.net/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/biblioteca.serveblog.net/privkey.pem;

    location /static/ {
        alias /app/staticfiles/;
    }

    location /media/ {
        alias /app/media/;
    }

    location / {
        proxy_pass http://web:8000;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto https;
    }
}